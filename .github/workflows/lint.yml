name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-verify:
    name: Build and verify no drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run build
        run: bash build.sh
      - name: Check for drift
        run: |
          if ! git diff --quiet agents/; then
            echo "::error::Built output differs from committed agents/ files."
            echo "Run 'bash build.sh' locally and commit the result."
            git diff agents/
            exit 1
          fi

  markdown-lint:
    name: Markdown lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          globs: "**/*.md"

