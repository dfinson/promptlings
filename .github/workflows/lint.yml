name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-verify:
    name: Build and verify no drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pyyaml
      - name: Run build
        run: python build.py
      - name: Check for drift
        run: |
          if ! git diff --quiet agents/; then
            echo "::error::Built output differs from committed agents/ files."
            echo "Run 'python build.py' locally and commit the result."
            git diff agents/
            exit 1
          fi

  markdown-lint:
    name: Markdown lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          globs: "**/*.md"

